<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receita Médica — Dr. Vítor Sabioni</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-dark:  #1a3a6b;
    --blue-mid:   #1e5bbf;
    --blue-main:  #2979d4;
    --edge:       rgba(255,255,255,0.15);
    --edge-light: rgba(255,255,255,0.25);
    --white:      #ffffff;
    --white-dim:  rgba(255,255,255,0.75);
    --white-ghost:rgba(255,255,255,0.45);
    --red:        #ff6b8a;
    --red-dim:    rgba(255,107,138,0.18);
    --green:      #4adeaa;
    --green-dim:  rgba(74,222,170,0.15);
    --amber:      #fbbf24;
    --amber-dim:  rgba(251,191,36,0.15);
    --violet:     #c4b5fd;
    --violet-dim: rgba(196,181,253,0.15);
    --grad-body:  linear-gradient(160deg, #1a4db5 0%, #1e5bbf 40%, #2563c7 100%);
    --font-display: 'Montserrat', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--grad-body);
    color: var(--white);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    overflow-x: hidden;
  }

  .page { max-width: 780px; margin: 0 auto; }

  .print-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 1.5rem;
  }

  .btn-print {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.12);
    color: #ffffff;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    padding: 9px 20px;
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
    text-decoration: none;
  }
  .btn-print:hover { background: rgba(255,255,255,0.22); }

  .receita-card {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--edge);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.25);
  }

  .header-azul {
    background: rgba(255,255,255,0.1);
    padding: 2.5rem 2.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
    border-bottom: 1px solid var(--edge);
  }

  .header-logo { display: flex; align-items: center; gap: 1.5rem; }

  .logo-wrap {
    width: 72px; height: 72px;
    border-radius: 14px;
    background: rgba(255,255,255,0.15);
    border: 1px solid var(--edge-light);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
  }

  .logo-img { width: 64px; height: 64px; object-fit: contain; }

  .medico-nome {
    font-family: var(--font-display);
    font-size: 24px; font-weight: 700;
    color: var(--white); letter-spacing: 0.1em;
    line-height: 1.1; text-transform: uppercase;
  }

  .medico-info {
    font-family: var(--font-body);
    font-size: 12px; color: var(--white-dim);
    margin-top: 5px; letter-spacing: 0.04em;
  }

  .header-meta { text-align: right; flex-shrink: 0; }
  .header-meta-item { margin-top: 12px; }
  .header-meta-item:first-child { margin-top: 0; }

  .header-meta .label {
    font-family: var(--font-display);
    font-size: 9px; color: var(--white-ghost);
    text-transform: uppercase; letter-spacing: 0.16em; font-weight: 600;
  }

  .header-meta .valor {
    font-family: var(--font-body);
    font-size: 13px; color: var(--white);
    font-weight: 400; margin-top: 2px;
  }

  .faixa-paciente {
    background: rgba(255,255,255,0.07);
    border-bottom: 1px solid var(--edge);
    padding: 1rem 2.5rem;
    display: flex; gap: 3rem; flex-wrap: wrap; align-items: center;
  }

  .pac-item .label {
    font-family: var(--font-display);
    font-size: 9px; color: var(--white-ghost);
    text-transform: uppercase; letter-spacing: 0.16em; font-weight: 600;
  }

  .pac-item .valor {
    font-family: var(--font-body);
    font-size: 14px; color: var(--white); font-weight: 500; margin-top: 3px;
  }

  .receita-body { padding: 2rem 2.5rem 1.5rem; }

  .section-label {
    font-family: var(--font-display);
    font-size: 9px; color: var(--white-dim);
    text-transform: uppercase; letter-spacing: 0.2em; font-weight: 600;
    margin-bottom: 1.25rem;
    display: flex; align-items: center; gap: 12px;
  }

  .section-label::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(255,255,255,0.2);
  }

  .med-card {
    border: 1px solid var(--edge);
    border-radius: 14px;
    margin-bottom: 0.75rem;
    overflow: hidden;
    background: rgba(255,255,255,0.1);
  }

  .med-header {
    display: flex; align-items: center; gap: 16px;
    padding: 1.1rem 1.4rem;
  }

  .med-num {
    width: 34px; height: 34px; border-radius: 8px;
    background: rgba(255,255,255,0.15);
    border: 1px solid var(--edge-light);
    color: var(--white); font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-family: var(--font-display);
  }

  .med-nome-wrap { flex: 1; }

  .med-nome {
    font-family: var(--font-display);
    font-size: 14px; font-weight: 700;
    color: var(--white); letter-spacing: 0.1em; text-transform: uppercase;
  }

  .med-sub { font-size: 12px; color: var(--white-dim); margin-top: 3px; }

  .med-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  .badge {
    font-family: var(--font-display);
    font-size: 9px; padding: 3px 9px; border-radius: 4px;
    font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    white-space: nowrap; border: 1px solid;
  }

  .badge-continuo { background: var(--green-dim); color: var(--green); border-color: rgba(74,222,170,0.3); }
  .badge-periodo  { background: var(--amber-dim); color: var(--amber); border-color: rgba(251,191,36,0.3); }
  .badge-atencao  { background: var(--red-dim);   color: var(--red);   border-color: rgba(255,107,138,0.3); }
  .badge-eventual { background: var(--violet-dim);color: var(--violet);border-color: rgba(196,181,253,0.3); }

  .med-body {
    display: block;
    border-top: 1px solid var(--edge);
    background: rgba(0,0,0,0.12);
    padding: 1.5rem 1.4rem 1.25rem;
  }

  .info-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1.25rem; margin-bottom: 1.1rem;
  }

  .info-item .label {
    font-family: var(--font-display);
    font-size: 9px; color: var(--white-ghost);
    text-transform: uppercase; letter-spacing: 0.15em; font-weight: 600;
  }

  .info-item .valor {
    font-family: var(--font-body);
    font-size: 14px; color: var(--white);
    margin-top: 5px; line-height: 1.5; font-weight: 400;
  }

  /* ── CHECKBOXES DE HORÁRIO ── */
  .horarios-check { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }

  .horario-check-item {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--edge);
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .horario-check-item.marcado {
    background: rgba(74,222,170,0.18);
    border-color: rgba(74,222,170,0.4);
  }

  .horario-check-item input[type="checkbox"] { display: none; }

  .check-icon {
    width: 18px; height: 18px; border-radius: 4px;
    border: 1.5px solid var(--white-ghost);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
    background: rgba(255,255,255,0.05);
  }

  .horario-check-item.marcado .check-icon {
    background: var(--green);
    border-color: var(--green);
  }

  .check-icon svg { display: none; }
  .horario-check-item.marcado .check-icon svg { display: block; }

  .check-label {
    font-family: var(--font-display);
    font-size: 12px; font-weight: 600;
    color: var(--white-dim);
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }

  .horario-check-item.marcado .check-label { color: var(--green); }

  /* ── DATA HOJE ── */
  .hoje-label {
    font-family: var(--font-display);
    font-size: 9px; color: var(--white-ghost);
    text-transform: uppercase; letter-spacing: 0.15em;
    font-weight: 600; margin-bottom: 4px;
  }

  .obs-box {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--edge);
    border-left: 3px solid rgba(255,255,255,0.5);
    border-radius: 0 8px 8px 0;
    padding: 0.9rem 1.1rem;
    font-size: 13px; color: var(--white-dim);
    line-height: 1.7; font-weight: 400; margin-top: 0.85rem;
  }

  .obs-label {
    font-family: var(--font-display);
    font-size: 9px; text-transform: uppercase;
    letter-spacing: 0.15em; color: var(--white-ghost);
    font-weight: 600; margin-bottom: 6px;
  }

  .alerta-box {
    background: var(--red-dim);
    border: 1px solid rgba(255,107,138,0.25);
    border-left: 3px solid var(--red);
    border-radius: 0 8px 8px 0;
    padding: 0.9rem 1.1rem;
    font-size: 13px; color: rgba(255,180,190,0.95);
    line-height: 1.7; font-weight: 400; margin-top: 0.85rem;
    display: flex; gap: 12px;
  }

  .bula-btn {
    display: inline-flex; align-items: center; gap: 7px;
    margin-top: 1.1rem;
    background: rgba(255,255,255,0.12);
    border: 1px solid var(--edge-light);
    border-radius: 6px; padding: 7px 16px;
    font-family: var(--font-display); font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--white-dim); text-decoration: none; transition: all 0.18s;
  }

  .bula-btn:hover { background: rgba(255,255,255,0.22); color: var(--white); }

  .receita-footer {
    margin-top: 1rem; padding: 1.75rem 2.5rem;
    border-top: 1px solid var(--edge);
    display: flex; justify-content: space-between;
    align-items: flex-end; flex-wrap: wrap; gap: 2rem;
    background: rgba(0,0,0,0.1);
  }

  .validade-info .titulo {
    font-family: var(--font-display); font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--white-ghost); font-weight: 600;
  }

  .validade-info .data {
    font-family: var(--font-display); font-size: 18px;
    color: var(--white); font-weight: 700; margin-top: 4px;
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .validade-info .nota {
    font-size: 11px; color: var(--white-ghost);
    margin-top: 7px; max-width: 320px; line-height: 1.6;
  }

  .assinatura { text-align: right; }

  .assinatura-linha {
    width: 160px; margin-left: auto; margin-bottom: 8px;
    height: 1px; background: rgba(255,255,255,0.35);
  }

  .assinatura-nome {
    font-family: var(--font-display); font-size: 13px;
    color: var(--white); font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
  }

  .assinatura-crm {
    font-family: var(--font-display); font-size: 10px;
    color: var(--white-ghost); font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px;
  }

  .faixa-inferior { height: 4px; background: rgba(255,255,255,0.2); }

  .loading-page {
    display: flex; align-items: center; justify-content: center;
    min-height: 60vh; font-size: 16px; color: var(--white-dim);
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border: 1px solid var(--edge-light);
    border-radius: 10px; padding: 12px 18px;
    font-size: 13px; color: var(--white); font-weight: 500;
    opacity: 0; transform: translateY(8px);
    transition: all 0.3s; pointer-events: none; z-index: 999;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 640px) {
    body { padding: 0.75rem 0.75rem 3rem; }
    .header-azul { flex-direction: column; align-items: flex-start; padding: 1.25rem 1rem 1rem; gap: 1rem; }
    .header-meta { text-align: left; display: flex; gap: 1.5rem; flex-wrap: wrap; width: 100%; }
    .header-meta-item { margin-top: 0; }
    .logo-wrap { width: 52px; height: 52px; }
    .logo-img  { width: 46px; height: 46px; }
    .medico-nome { font-size: 17px; }
    .faixa-paciente { padding: 0.85rem 1rem; gap: 0.75rem; flex-direction: column; align-items: flex-start; }
    .receita-body { padding: 1rem; }
    .info-grid { grid-template-columns: 1fr; gap: 0.75rem; }
    .med-header { padding: 0.9rem 1rem; gap: 10px; flex-wrap: wrap; }
    .med-body { padding: 1rem; }
    .receita-footer { padding: 1rem; }
    .assinatura { text-align: left; width: 100%; }
    .assinatura-linha { margin-left: 0; }
  }
</style>
</head>
<body>
<div class="page">
  <div id="app"><div class="loading-page">Carregando receita...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://jtxoxmrjoixzkwwzgrui.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0eG94bXJqb2l4emt3d3pncnVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1Mjc5MTQsImV4cCI6MjA5MjEwMzkxNH0.SYDTrqmp3UoNGIQMy90kquq461lGMiUYQYRXWFcD0Kc';

  const numerais = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];
  const badgeMap = {
    continuo: 'badge-continuo',
    periodo:  'badge-periodo',
    eventual: 'badge-eventual',
    atencao:  'badge-atencao',
  };
  const badgeLabel = {
    continuo: 'Uso contínuo',
    periodo:  'Por período',
    eventual: 'Se necessário',
    atencao:  'Antibiótico',
  };

  async function sbFetch(path, opts = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      method: opts.method || 'GET',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': opts.prefer || '',
        ...(opts.headers || {})
      },
      body: opts.body || undefined,
    });
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  const hoje = new Date().toISOString().slice(0, 10);

  async function loadReceita() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) {
      document.getElementById('app').innerHTML = '<div class="loading-page">Receita não encontrada.</div>';
      return;
    }

    const [receitas, checkins] = await Promise.all([
      sbFetch(`receitas?id=eq.${id}&select=*`),
      sbFetch(`checkins?receita_id=eq.${id}&data_checkin=eq.${hoje}`),
    ]);

    if (!receitas || receitas.length === 0) {
      document.getElementById('app').innerHTML = '<div class="loading-page">Receita não encontrada.</div>';
      return;
    }

    const r = receitas[0];
    const checkinSet = new Set((checkins || []).filter(c => c.marcado).map(c => `${c.medicamento_index}-${c.horario}`));

    const validade30 = (() => {
      const d = new Date();
      d.setDate(d.getDate() + 30);
      return d.toLocaleDateString('pt-BR');
    })();

    const medsHtml = (r.medicamentos || []).map((m, i) => {
      const horariosHtml = (m.horarios || []).length > 0
        ? `
          <div class="hoje-label">Hoje — marque ao tomar</div>
          <div class="horarios-check" id="horarios-${i}">
            ${m.horarios.map(h => {
              const key = `${i}-${h}`;
              const marcado = checkinSet.has(key);
              return `
                <label class="horario-check-item ${marcado ? 'marcado' : ''}" id="check-${i}-${encodeURIComponent(h)}" onclick="toggleCheck('${id}', ${i}, '${h}', this)">
                  <div class="check-icon">
                    <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                      <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </div>
                  <span class="check-label">${h}</span>
                </label>
              `;
            }).join('')}
          </div>
        `
        : '';

      return `
        <div class="med-card">
          <div class="med-header">
            <div class="med-num">${numerais[i] || i+1}</div>
            <div class="med-nome-wrap">
              <div class="med-nome">${m.nome || ''}</div>
              <div class="med-sub">${m.sub || ''}</div>
            </div>
            <div class="med-badges">
              ${m.badge ? `<span class="badge ${badgeMap[m.badge] || ''}">${badgeLabel[m.badge] || m.badge}</span>` : ''}
            </div>
          </div>
          <div class="med-body">
            <div class="info-grid">
              ${m.dose ? `<div class="info-item"><div class="label">Dose</div><div class="valor">${m.dose}</div></div>` : ''}
              ${m.duracao ? `<div class="info-item"><div class="label">Duração</div><div class="valor">${m.duracao}</div></div>` : ''}
              ${m.forma ? `<div class="info-item"><div class="label">Forma de uso</div><div class="valor">${m.forma}</div></div>` : ''}
              ${m.indicacao ? `<div class="info-item"><div class="label">Indicação</div><div class="valor">${m.indicacao}</div></div>` : ''}
              ${(m.horarios || []).length > 0 ? `<div class="info-item">${horariosHtml}</div>` : ''}
            </div>
            ${m.alerta ? `
              <div class="alerta-box">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;margin-top:2px"><path d="M8 2L14 13H2L8 2Z" stroke="currentColor" stroke-width="1.3"/><line x1="8" y1="6.5" x2="8" y2="9.5" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="11.2" r="0.65" fill="currentColor"/></svg>
                <span><strong>Atenção:</strong> ${m.alerta}</span>
              </div>
            ` : ''}
            ${m.obs ? `
              <div class="obs-box">
                <div class="obs-label">Orientações do médico</div>
                ${m.obs}
              </div>
            ` : ''}
            ${m.bula ? `
              <a class="bula-btn" href="${m.bula}" target="_blank">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="2" y="1" width="12" height="14" rx="1.5" stroke="currentColor" stroke-width="1.2"/><line x1="5" y1="5" x2="11" y2="5" stroke="currentColor" stroke-width="1"/><line x1="5" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1"/><line x1="5" y1="11" x2="8" y2="11" stroke="currentColor" stroke-width="1"/></svg>
                Ver bula completa (ANVISA)
              </a>
            ` : ''}
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('app').innerHTML = `
      <div class="print-bar">
        <a class="btn-print" href="https://wa.me/5531980478448" target="_blank" rel="noopener">
